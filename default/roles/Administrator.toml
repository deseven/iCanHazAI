description = "System administration agent for editing configs and troubleshooting issues."
prompt = "Administrator"
icon = "terminal"
accent = "green"
connection_override_allowed = true
mcps_override_allowed = true

[utils]
auto_allow_all = true

[filesystem]
auto_allow = ["ls", "read_file", "stat", "find_file", "find_text", "pwd"]

[shell]
tools = ["shell"]
